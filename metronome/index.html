<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Metronome</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <a href="../metronome-docs/" class="docs-link" style="position:fixed;top:16px;right:16px;z-index:100;font-size:1.4rem;text-decoration:none;opacity:0.5;transition:opacity 0.2s" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.5'" title="Docs">📖</a>

  <div class="container">
    <h1 class="title">Metronome</h1>

    <div class="bpm-display">
      <span id="bpm-value">120</span>
      <span class="bpm-label">BPM</span>
    </div>

    <div class="bpm-controls">
      <button class="bpm-btn" data-delta="-5">−5</button>
      <button class="bpm-btn" data-delta="-1">−1</button>
      <input type="number" id="bpm-input" min="40" max="240" value="120">
      <button class="bpm-btn" data-delta="1">+1</button>
      <button class="bpm-btn" data-delta="5">+5</button>
    </div>

    <input type="range" id="bpm-slider" min="40" max="240" value="120" class="slider bpm-slider">

    <div id="beat-display" class="beat-display">
      <!-- Beat indicators generated by JS -->
    </div>

    <div class="main-buttons">
      <button id="start-btn" class="start-btn">Start</button>
      <button id="tap-btn" class="tap-btn">Tap</button>
    </div>

    <div class="settings">
      <div class="setting-group">
        <label>Time Signature</label>
        <select id="time-sig">
          <option value="2/4">2/4</option>
          <option value="3/4">3/4</option>
          <option value="4/4" selected>4/4</option>
          <option value="5/4">5/4</option>
          <option value="6/8">6/8</option>
          <option value="7/8">7/8</option>
        </select>
      </div>

      <div class="setting-group">
        <label>Subdivision</label>
        <select id="subdivision">
          <option value="1">None</option>
          <option value="2">8th notes</option>
          <option value="3">Triplets</option>
          <option value="4">16th notes</option>
        </select>
      </div>

      <div class="setting-group">
        <label>Accent</label>
        <select id="accent-mode">
          <option value="off">全拍同じ音</option>
          <option value="1" selected>1拍目にアクセント</option>
          <option value="2">2拍目にアクセント</option>
          <option value="3">3拍目にアクセント</option>
          <option value="4">4拍目にアクセント</option>
        </select>
      </div>

      <div class="setting-group">
        <label>Volume</label>
        <input type="range" id="volume" min="0" max="1" step="0.01" value="0.7" class="slider volume-slider">
      </div>
    </div>

    <div class="shortcuts-hint">
      <span>Space: start/stop</span>
      <span>T: tap</span>
      <span>↑↓: BPM ±1</span>
    </div>
  </div>

  <script src="metronome.js"></script>
</body>
</html>
