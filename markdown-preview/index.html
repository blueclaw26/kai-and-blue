<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markdown Preview</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <header class="top-bar">
    <div class="top-bar-left">
      <a href="../" class="back-link">←</a>
      <h1>Markdown Preview</h1>
    </div>
    <div class="top-bar-right">
      <a href="../markdown-docs/" class="docs-link" title="Docs">📖 docs</a>
      <button id="copy-btn" class="btn" title="Copy HTML to clipboard">📋 Copy HTML</button>
      <button id="clear-btn" class="btn" title="Clear editor">🗑 Clear</button>
    </div>
  </header>
  <main class="editor-container">
    <div class="pane editor-pane">
      <div class="pane-header">Editor</div>
      <textarea id="editor" spellcheck="false"></textarea>
    </div>
    <div class="divider"></div>
    <div class="pane preview-pane">
      <div class="pane-header">Preview</div>
      <div id="preview" class="preview-content"></div>
    </div>
  </main>
  <script src="markdown.js"></script>
</body>
</html>
