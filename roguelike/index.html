<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Roguelike Dungeon</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="game-wrapper">
    <div id="side-panel">
      <div class="panel-section">
        <div class="panel-title">操作</div>
        <div class="panel-content">
          <div class="key-group"><span class="key-label">移動</span><span class="key-value">矢印 / hjkl</span></div>
          <div class="key-group"><span class="key-label">ナナメ</span><span class="key-value">yubn / テンキー</span></div>
          <div class="key-group"><span class="key-label">足踏み</span><span class="key-value">. / テンキー5</span></div>
          <div class="key-group"><span class="key-label">階段</span><span class="key-value">&gt;</span></div>
          <div class="key-group"><span class="key-label">拾う</span><span class="key-value">g / ,</span></div>
          <div class="key-group"><span class="key-label">持ち物</span><span class="key-value">i</span></div>
        </div>
      </div>
      <div class="panel-section">
        <div class="panel-title">持ち物操作</div>
        <div class="panel-content">
          <div class="key-group"><span class="key-label">使う</span><span class="key-value">e</span></div>
          <div class="key-group"><span class="key-label">装備</span><span class="key-value">E</span></div>
          <div class="key-group"><span class="key-label">置く</span><span class="key-value">d</span></div>
          <div class="key-group"><span class="key-label">閉じる</span><span class="key-value">Esc</span></div>
        </div>
      </div>
    </div>

    <div id="game-container">
      <div id="status-bar">1F | HP: 15/15 | Lv.1 | Exp: 0 | 敵: 0</div>
      <canvas id="game-canvas"></canvas>
      <div id="minimap-container">
        <canvas id="minimap-canvas"></canvas>
      </div>
      <div id="message-log"></div>
    </div>
  </div>

  <div id="game-over-overlay" style="display:none;">
    <div class="game-over-box">
      <div class="game-over-title">倒れてしまった...</div>
      <div class="game-over-info">
        <span class="go-floor">1F</span> で力尽きた（<span class="go-level">Lv.1</span>）
      </div>
      <button id="restart-btn" class="restart-button">もう一度挑戦する</button>
    </div>
  </div>

  <script src="src/dungeon.js"></script>
  <script src="src/entity.js"></script>
  <script src="src/data/enemies.js"></script>
  <script src="src/data/items.js"></script>
  <script src="src/item.js"></script>
  <script src="src/player.js"></script>
  <script src="src/enemy.js"></script>
  <script src="src/renderer.js"></script>
  <script src="src/ui.js"></script>
  <script src="src/turn.js"></script>
  <script src="src/game.js"></script>
  <script src="src/input.js"></script>
  <script src="src/main.js"></script>

  <a href="../roguelike-docs/" class="docs-link" title="制作記録">📖</a>
</body>
</html>
