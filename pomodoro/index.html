<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pomodoro Timer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1 class="title">Pomodoro</h1>

    <div class="timer-wrapper">
      <svg class="progress-ring" viewBox="0 0 260 260">
        <circle class="progress-ring__bg" cx="130" cy="130" r="120" />
        <circle class="progress-ring__circle" cx="130" cy="130" r="120" />
      </svg>
      <div class="timer-display">
        <span id="minutes">25</span><span class="colon">:</span><span id="seconds">00</span>
      </div>
      <div class="mode-label" id="modeLabel">Work</div>
    </div>

    <div class="controls">
      <button id="startBtn" class="btn btn-primary">Start</button>
      <button id="pauseBtn" class="btn btn-secondary" disabled>Pause</button>
      <button id="resetBtn" class="btn btn-secondary">Reset</button>
    </div>

    <div class="session-counter">
      <span>🍅</span> <span id="sessionCount">0</span> sessions
    </div>

    <details class="settings">
      <summary>Settings</summary>
      <div class="settings-body">
        <label>
          Work (min)
          <input type="number" id="workInput" min="1" max="120" value="25">
        </label>
        <label>
          Break (min)
          <input type="number" id="breakInput" min="1" max="60" value="5">
        </label>
        <button id="saveSettingsBtn" class="btn btn-small">Save</button>
      </div>
    </details>
  </div>

  <script src="pomodoro.js"></script>
</body>
</html>
