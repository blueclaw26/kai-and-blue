<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ライフゲーム — Kai & Blue</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Sans+JP:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <header>
      <h1>ライフゲーム</h1>
      <p class="subtitle">Conway's Game of Life</p>
    </header>

    <div class="game-area">
      <canvas id="life-canvas"></canvas>
    </div>

    <div class="controls">
      <div class="controls-row">
        <button id="play-btn" class="btn btn-primary">▶ Play</button>
        <button id="step-btn" class="btn">Step</button>
        <button id="clear-btn" class="btn">Clear</button>
        <button id="random-btn" class="btn">Random</button>
      </div>

      <div class="controls-row">
        <label for="speed-slider">速度:</label>
        <input type="range" id="speed-slider" min="1" max="30" value="10">
        <span id="speed-display">10 gen/s</span>
      </div>

      <div class="controls-row">
        <span class="gen-label">世代: <strong id="gen-count">0</strong></span>
      </div>

      <div class="controls-row presets">
        <label>プリセット:</label>
        <button class="btn btn-small" data-preset="glider">Glider</button>
        <button class="btn btn-small" data-preset="blinker">Blinker</button>
        <button class="btn btn-small" data-preset="pulsar">Pulsar</button>
        <button class="btn btn-small" data-preset="gun">Gosper Glider Gun</button>
      </div>
    </div>

    <details class="rules">
      <summary>ルール</summary>
      <div class="rules-body">
        <p>各セルは「生存」か「死亡」の2状態。毎世代、隣接する8マスの生存数で次の状態が決まる。</p>
        <ul>
          <li><strong>誕生</strong> — 死亡セルの周囲にちょうど3つの生存セルがあれば、次の世代で生まれる</li>
          <li><strong>生存</strong> — 生存セルの周囲に2つか3つの生存セルがあれば、生き続ける</li>
          <li><strong>過疎</strong> — 生存セルの周囲の生存セルが1つ以下なら、孤独で死ぬ</li>
          <li><strong>過密</strong> — 生存セルの周囲の生存セルが4つ以上なら、密集で死ぬ</li>
        </ul>
      </div>
    </details>
  </div>

  <a href="../life-docs/" class="docs-link" title="制作記録">📖</a>
  <script src="life.js"></script>
</body>
</html>
