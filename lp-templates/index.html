<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LP テンプレートギャラリー</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <a href="../index.html" class="back-link">← ホームに戻る</a>
    <h1 class="page-title">LP テンプレートギャラリー</h1>
    <p class="page-subtitle">ターゲット顧客別のランディングページ8パターン</p>

    <div class="template-grid" id="templateGrid"></div>
  </div>

  <!-- Overlay -->
  <div class="overlay" id="overlay">
    <div class="overlay-header">
      <span class="overlay-title" id="overlayTitle"></span>
      <div class="overlay-tabs">
        <button class="overlay-tab active" data-tab="preview" onclick="switchTab('preview')">プレビュー</button>
        <button class="overlay-tab" data-tab="source" onclick="switchTab('source')">ソース</button>
      </div>
      <button class="overlay-close" onclick="closeOverlay()">✕</button>
    </div>
    <div class="overlay-body">
      <iframe id="previewFrame"></iframe>
      <pre id="sourceView"></pre>
    </div>
  </div>

  <a href="../lp-docs/" class="docs-link" title="制作記録">📖</a>

  <script src="lp.js"></script>
  <script>
    const grid = document.getElementById('templateGrid');
    const overlay = document.getElementById('overlay');
    const overlayTitle = document.getElementById('overlayTitle');
    const previewFrame = document.getElementById('previewFrame');
    const sourceView = document.getElementById('sourceView');

    let currentSource = '';

    window.LP_TEMPLATES.forEach((tpl, i) => {
      const card = document.createElement('div');
      card.className = 'template-card';
      card.innerHTML = `
        <div class="card-header">
          <span class="card-name">${tpl.name}</span>
          <span class="card-tag">${tpl.target}</span>
        </div>
        <p class="card-desc">${tpl.description}</p>
        <div class="card-color-bar" style="background: linear-gradient(90deg, ${tpl.colors[0]}, ${tpl.colors[1] || tpl.colors[0]})"></div>
      `;
      card.addEventListener('click', () => openOverlay(tpl));
      grid.appendChild(card);
    });

    function openOverlay(tpl) {
      overlayTitle.textContent = tpl.name;
      currentSource = tpl.html;
      previewFrame.srcdoc = tpl.html;
      sourceView.textContent = tpl.html;
      switchTab('preview');
      overlay.classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeOverlay() {
      overlay.classList.remove('active');
      previewFrame.srcdoc = '';
      document.body.style.overflow = '';
    }

    function switchTab(tab) {
      document.querySelectorAll('.overlay-tab').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.tab === tab);
      });
      if (tab === 'preview') {
        previewFrame.style.display = 'block';
        sourceView.style.display = 'none';
      } else {
        previewFrame.style.display = 'none';
        sourceView.style.display = 'block';
      }
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeOverlay();
    });

    overlay.addEventListener('click', e => {
      if (e.target === overlay) closeOverlay();
    });
  </script>
</body>
</html>
